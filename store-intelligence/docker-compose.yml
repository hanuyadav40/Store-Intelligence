services:
  store-intelligence:
    build:
      context: .
      dockerfile: Dockerfile
    image: store-intelligence:latest
    container_name: store-intelligence-api
    ports:
      - "8000:8000"   # FastAPI
      - "8001:8001"   # Prometheus metrics
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DEMO_MODE=false
      - DATA_DIR=/app/data
      - SALES_CSV_PATH=/app/data/sales.csv
      - CAMERA_ID=cam_01
      - CONFIDENCE_THRESHOLD=0.4
      - SESSION_WINDOW_MINUTES=30
      - STAFF_DWELL_THRESHOLD_HOURS=4
      - GROUP_ENTRY_WINDOW_SECONDS=2
      - GROUP_ENTRY_MIN_SIZE=2
      - ENGAGEMENT_DWELL_SECONDS=120
      - ENTRY_LINE_Y_FRACTION=0.4
      - FOOTFALL_SPIKE_THRESHOLD=2.0
      - DWELL_TIME_ANOMALY_MINUTES=60
      - CROWD_THRESHOLD=10
      - ENABLE_PROMETHEUS=true
      - PROMETHEUS_PORT=8001
      - DEMO_INTERVAL_SECONDS=5
    volumes:
      - ./data:/app/data            # mount local data/ so videos & CSVs are visible
      - ../CCTV Footage:/app/data/cctv:ro   # actual CCTV footage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
